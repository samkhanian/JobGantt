<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Execution Timeline | Full-Screen · خط عمودی پویا</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', 'Tahoma', Geneva, Verdana, sans-serif;
      background: #0f172a;
      padding: 0;
      margin: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    
    /* full-screen container */
    .container {
      width: 100%;
      height: 100%;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      border-radius: 0;
      padding: 16px 20px 20px 20px;
      overflow: hidden;
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 2px;
      color: #0f172a;
      font-weight: 600;
    }
    
    .subtitle {
      color: #475569;
      margin-bottom: 14px;
      font-size: 0.75rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 8px;
    }
    
    .filter-bar {
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }
    
    .filter-btn {
      padding: 6px 18px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      border-radius: 40px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .filter-btn.active {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }
    
    .info-text {
      background: #fef2f2;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      color: #dc2626;
      margin-left: auto;
    }
    
    /* chart container with scrolling both directions */
    .chart-container {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: white;
    }
    
    .timeline {
      position: relative;
      min-width: 1100px;
    }
    
    /* header */
    .timeline-header {
      display: flex;
      position: sticky;
      top: 0;
      background: #f1f5f9;
      z-index: 20;
      border-bottom: 2px solid #cbd5e1;
    }
    
    .label-header {
      width: 240px;
      flex-shrink: 0;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 11px;
      color: #0c4a6e;
      background: #f1f5f9;
      border-right: 2px solid #cbd5e1;
    }
    
    /* hidden time header */
    .time-header-dummy {
      display: none;
    }
    
    /* ردیف‌ها با ارتفاع کم و فاصله حداقل */
    .timeline-row {
      display: flex;
      height: 32px;
      border-bottom: 1px solid #ecf3fa;
      position: relative;
    }
    
    .timeline-row:hover {
      background: #fafcff;
    }
    
    .job-label {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 12px;
      font-size: 11px;      /* فونت کوچک‌تر */
      font-weight: 600;
      color: #1f3a5f;
      background: white;
      border-right: 2px solid #e2edf7;
      position: sticky;
      left: 0;
      z-index: 10;
      font-family: 'Segoe UI', monospace;
    }
    
    .duration-badge {
      background: #e6f0ff;
      padding: 2px 6px;
      border-radius: 24px;
      font-size: 9px;
      font-weight: 700;
      color: #1e5a9c;
    }
    
    .bars-container {
      flex: 1;
      position: relative;
      height: 32px;
      background: #ffffff;
    }
    
    .bar {
      position: absolute;
      top: 4px;
      height: 24px;
      background: #3b82f6;
      opacity: 0.85;
      cursor: pointer;
      min-width: 3px;
      z-index: 10;
      border-radius: 6px;
      transition: 0.05s linear;
    }
    
    .bar:hover {
      opacity: 1;
      filter: brightness(1.05);
    }
    
    .overlay-highlight {
      position: absolute;
      top: 4px;
      height: 24px;
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid #dc2626;
      border-radius: 6px;
      z-index: 15;
      pointer-events: none;
    }
    
    /* خط عمودی: اکنون position fixed نسبت به container? برای اسکرول باید absolute و relative پیچیده شود */
    /* راه حل: wrapper نسبی و خط به صورت sticky-like ولی با absolute نسبت به .chart-container؟
       برای اینکه خط با اسکرول افقی و عمودی حرکت کند، خط را داخل .timeline-grid قرار میدهیم و 
       از absolute با مختصات real-time استفاده می‌کنیم که هنگام اسکرول با جاوااسکریپت تنظیم شود.
       روش ساده‌تر: خط را همانند قبل داخل chart-container قرار دهیم و هنگام اسکرول موقعیت خط را بروز کنیم.
    */
    .vertical-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #f97316;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 0 6px #f97316;
      display: none;
      will-change: transform;
    }
    
    .time-tooltip {
      position: fixed;
      background: #0f172a;
      color: #facc15;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: monospace;
      font-weight: bold;
      pointer-events: none;
      z-index: 101;
      white-space: nowrap;
      border: 1px solid #f97316;
      display: none;
    }
    
    .info-box {
      position: fixed;
      background: #0a0f1c;
      backdrop-filter: blur(4px);
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 11px;
      font-family: monospace;
      pointer-events: none;
      z-index: 102;
      max-width: 320px;
      border-left: 3px solid #f97316;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      display: none;
      line-height: 1.45;
    }
    
    /* اسکرول نرم */
    .chart-container::-webkit-scrollbar {
      height: 7px;
      width: 7px;
    }
    .chart-container::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .chart-container::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ Job Execution Timeline</h1>
  <div class="subtitle">بدون نمایش ساعت · فشرده · خط عمودی همراه با اسکرول</div>
  
  <div class="filter-bar">
    <button id="btnAll" class="filter-btn active">📋 همه جاب‌ها</button>
    <button id="btnOverlap" class="filter-btn">🔴 فقط جاب‌های همپوشان</button>
    <div id="info" class="info-text">در حال بارگذاری...</div>
  </div>
  
  <div class="chart-container" id="chartContainer">
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script>
  const DAY_SECONDS = 86400;
  let allJobs = [];
  let currentFilter = 'all';
  let isSnapped = false;
  let currentSnappedSec = null;
  let importantPoints = [];
  
  // elements global
  let verticalLine = null;
  let tooltipDiv = null;
  let infoBoxDiv = null;
  let activeOverlaps = [];
  let activeJobsForRender = [];
  
  function toSeconds(timeStr) {
    const parts = timeStr.split(':');
    return (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
  }
  
  function formatDuration(sec) {
    const hours = Math.floor(sec / 3600);
    const mins = Math.floor((sec % 3600) / 60);
    const secs = sec % 60;
    if (hours > 0) {
      if (mins === 0 && secs === 0) return `${hours}h`;
      return `${hours}h ${mins}m`;
    }
    if (mins === 0) return `${secs}s`;
    return `${mins}m ${secs}s`;
  }
  
  function secondsToTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }
  
  function findAllOverlaps(jobs) {
    const overlaps = [];
    for (let i = 0; i < jobs.length; i++) {
      for (let j = i + 1; j < jobs.length; j++) {
        const s1 = toSeconds(jobs[i].start);
        const e1 = toSeconds(jobs[i].end);
        const s2 = toSeconds(jobs[j].start);
        const e2 = toSeconds(jobs[j].end);
        if (s1 < e2 && s2 < e1) {
          const oStart = Math.max(s1, s2);
          const oEnd = Math.min(e1, e2);
          overlaps.push({ start: oStart, end: oEnd, jobs: [jobs[i].name, jobs[j].name] });
        }
      }
    }
    overlaps.sort((a,b) => a.start - b.start);
    const merged = [];
    for (const seg of overlaps) {
      if (merged.length === 0 || seg.start > merged[merged.length-1].end) {
        merged.push({ start: seg.start, end: seg.end, jobs: [...seg.jobs] });
      } else {
        merged[merged.length-1].end = Math.max(merged[merged.length-1].end, seg.end);
        merged[merged.length-1].jobs = [...new Set([...merged[merged.length-1].jobs, ...seg.jobs])];
      }
    }
    return merged;
  }
  
  function collectImportantPoints(jobs, overlaps) {
    const points = new Set();
    jobs.forEach(j => { points.add(toSeconds(j.start)); points.add(toSeconds(j.end)); });
    overlaps.forEach(o => { points.add(o.start); points.add(o.end); });
    return Array.from(points).sort((a,b)=>a-b);
  }
  
  function findNearestPoint(mouseSec, points) {
    let nearest = points[0];
    let minDiff = Math.abs(mouseSec - nearest);
    for (const p of points) {
      const diff = Math.abs(mouseSec - p);
      if (diff < minDiff) { minDiff = diff; nearest = p; }
    }
    return nearest;
  }
  
  function getPointInfo(sec, jobs, overlaps) {
    const info = { time: secondsToTime(sec), starting: [], ending: [], inOverlap: [] };
    jobs.forEach(job => {
      if (toSeconds(job.start) === sec) info.starting.push(job.name);
      if (toSeconds(job.end) === sec) info.ending.push(job.name);
    });
    overlaps.forEach(overlap => {
      if (sec >= overlap.start && sec <= overlap.end) {
        info.inOverlap.push({ start: secondsToTime(overlap.start), end: secondsToTime(overlap.end), jobs: overlap.jobs });
      }
    });
    return info;
  }
  
  // محاسبه عرض نوار بر اساس اولین bars-container
  function getBarsWidth() {
    const bc = document.querySelector('.bars-container');
    if (bc) return bc.clientWidth;
    return 1000;
  }
  
  // به روزرسانی موقعیت خط عمودی بر اساس نقطه فعلی (با در نظر گرفتن اسکرول)
  function updateVerticalLinePosition(sec, forceSnapOffset = false) {
    if (!verticalLine) return;
    const bars = document.querySelector('.bars-container');
    if (!bars) return;
    const barsRect = bars.getBoundingClientRect();
    const containerRect = document.getElementById('chartContainer').getBoundingClientRect();
    const barWidth = bars.clientWidth;
    if (barWidth <= 0) return;
    const leftRatio = sec / DAY_SECONDS;
    const leftOffsetWithinBars = leftRatio * barWidth;
    const absoluteLeft = barsRect.left - containerRect.left + leftOffsetWithinBars;
    verticalLine.style.left = absoluteLeft + 'px';
    verticalLine.style.display = 'block';
  }
  
  // تابعی که هنگام اسکرول، موقعیت خط snapped را مجدداً محاسبه می‌کند
  function repositionSnappedLine() {
    if (isSnapped && currentSnappedSec !== null) {
      updateVerticalLinePosition(currentSnappedSec);
    }
  }
  
  // رندر کامل
  function render(jobs) {
    activeJobsForRender = jobs;
    const overlaps = findAllOverlaps(jobs);
    activeOverlaps = overlaps;
    const points = collectImportantPoints(jobs, overlaps);
    importantPoints = points;
    
    const timelineDiv = document.getElementById('timeline');
    timelineDiv.innerHTML = '';
    
    // header
    const header = document.createElement('div');
    header.className = 'timeline-header';
    const labelHeader = document.createElement('div');
    labelHeader.className = 'label-header';
    labelHeader.textContent = '📌 Job Name';
    header.appendChild(labelHeader);
    const dummy = document.createElement('div');
    dummy.style.flex = '1';
    dummy.style.display = 'none';
    header.appendChild(dummy);
    timelineDiv.appendChild(header);
    
    // گروه‌بندی جاب ها
    const jobMap = new Map();
    jobs.forEach(job => {
      if (!jobMap.has(job.name)) jobMap.set(job.name, []);
      jobMap.get(job.name).push(job);
    });
    
    // ابتدا ردیف‌ها را می‌سازیم بدون width دقیق (بعدا تنظیم می‌شود)
    for (const [jobName, runs] of jobMap) {
      const row = document.createElement('div');
      row.className = 'timeline-row';
      const label = document.createElement('div');
      label.className = 'job-label';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = jobName;
      let totalSec = 0;
      runs.forEach(r => totalSec += toSeconds(r.end) - toSeconds(r.start));
      const durationSpan = document.createElement('span');
      durationSpan.className = 'duration-badge';
      durationSpan.textContent = formatDuration(totalSec);
      label.appendChild(nameSpan);
      label.appendChild(durationSpan);
      
      const barsContainer = document.createElement('div');
      barsContainer.className = 'bars-container';
      barsContainer.style.position = 'relative';
      // ذخیره داده‌های runs در attributes برای رندر مجدد عرض
      barsContainer.setAttribute('data-job', jobName);
      barsContainer.jobRuns = runs; // attach for later
      row.appendChild(label);
      row.appendChild(barsContainer);
      timelineDiv.appendChild(row);
    }
    
    // پس از append شدن، عرض نوارها را محاسبه و نوارها را رسم می‌کنیم
    setTimeout(() => {
      const barContainers = document.querySelectorAll('.bars-container');
      if (barContainers.length === 0) return;
      const referenceWidth = barContainers[0].clientWidth;
      if (referenceWidth === 0) return;
      
      // برای هر container بارها را رسم کن
      const rows = document.querySelectorAll('.timeline-row');
      let idx = 0;
      for (const [jobName, runs] of jobMap) {
        const barsContainer = rows[idx]?.querySelector('.bars-container');
        if (!barsContainer) { idx++; continue; }
        barsContainer.innerHTML = ''; // clear placeholders
        
        // رسم بارهای اصلی
        runs.forEach(run => {
          const startSec = toSeconds(run.start);
          const endSec = toSeconds(run.end);
          const left = (startSec / DAY_SECONDS) * referenceWidth;
          const width = ((endSec - startSec) / DAY_SECONDS) * referenceWidth;
          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.left = left + 'px';
          bar.style.width = Math.max(width, 3) + 'px';
          bar.title = `${jobName}\n${run.start} → ${run.end}\nمدت: ${formatDuration(endSec - startSec)}`;
          barsContainer.appendChild(bar);
        });
        
        // رسم هایلایت همپوشانی
        overlaps.forEach(overlap => {
          if (overlap.jobs.includes(jobName)) {
            const left = (overlap.start / DAY_SECONDS) * referenceWidth;
            const width = ((overlap.end - overlap.start) / DAY_SECONDS) * referenceWidth;
            const hl = document.createElement('div');
            hl.className = 'overlay-highlight';
            hl.style.left = left + 'px';
            hl.style.width = Math.max(width, 3) + 'px';
            hl.title = `همپوشانی: ${secondsToTime(overlap.start)} → ${secondsToTime(overlap.end)}\n${overlap.jobs.join(' , ')}`;
            barsContainer.appendChild(hl);
          }
        });
        idx++;
      }
      
      // بعد از رندر، اگر snapped فعال بود، موقعیت خط را بروز کن
      if (isSnapped && currentSnappedSec !== null) {
        updateVerticalLinePosition(currentSnappedSec);
      }
      attachScrollAndResizeEvents();
    }, 30);
  }
  
  // اتصال رخدادهای اسکرول و ریسایز برای نگهداری خط عمودی
  function attachScrollAndResizeEvents() {
    const container = document.getElementById('chartContainer');
    if (!container) return;
    // حذف رخدادهای قبلی برای جلوگیری از چند بار
    container.removeEventListener('scroll', repositionSnappedLine);
    container.removeEventListener('resize', repositionSnappedLine);
    container.addEventListener('scroll', repositionSnappedLine);
    window.removeEventListener('resize', repositionSnappedLine);
    window.addEventListener('resize', () => {
      if (isSnapped && currentSnappedSec !== null) {
        setTimeout(() => updateVerticalLinePosition(currentSnappedSec), 20);
      } else {
        // در حالت عادی هم اگر خط فعال نیست اما ماوس حرکت بعدا
      }
    });
  }
  
  // راه‌اندازی موس و خط پویا به همراه اسکرول
  function initMouseTracking() {
    const container = document.getElementById('chartContainer');
    if (!container) return;
    
    // حذف المانهای قبلی
    const oldLine = document.querySelector('.vertical-line');
    const oldTooltip = document.querySelector('.time-tooltip');
    const oldInfoBox = document.querySelector('.info-box');
    if (oldLine) oldLine.remove();
    if (oldTooltip) oldTooltip.remove();
    if (oldInfoBox) oldInfoBox.remove();
    
    verticalLine = document.createElement('div');
    verticalLine.className = 'vertical-line';
    tooltipDiv = document.createElement('div');
    tooltipDiv.className = 'time-tooltip';
    infoBoxDiv = document.createElement('div');
    infoBoxDiv.className = 'info-box';
    
    container.appendChild(verticalLine);
    container.appendChild(tooltipDiv);
    container.appendChild(infoBoxDiv);
    
    let lastMouseSec = null;
    let currentHoverPoint = null;
    
    container.addEventListener('mousemove', (e) => {
      if (isSnapped) return;
      const bars = document.querySelector('.bars-container');
      if (!bars) return;
      const barsRect = bars.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const relX = e.clientX - barsRect.left;
      if (relX >= 0 && relX <= barsRect.width) {
        const barWidth = bars.clientWidth;
        const mouseSec = (relX / barWidth) * DAY_SECONDS;
        const nearestSec = findNearestPoint(mouseSec, importantPoints);
        currentHoverPoint = nearestSec;
        const leftRatio = nearestSec / DAY_SECONDS;
        const leftOffset = leftRatio * barWidth;
        const absoluteLeft = barsRect.left - containerRect.left + leftOffset;
        verticalLine.style.left = absoluteLeft + 'px';
        verticalLine.style.display = 'block';
        tooltipDiv.style.display = 'block';
        tooltipDiv.innerHTML = `🕐 ${secondsToTime(nearestSec)}`;
        tooltipDiv.style.left = (e.clientX + 12) + 'px';
        tooltipDiv.style.top = (e.clientY - 35) + 'px';
        lastMouseSec = nearestSec;
      } else {
        verticalLine.style.display = 'none';
        tooltipDiv.style.display = 'none';
        currentHoverPoint = null;
      }
    });
    
    container.addEventListener('click', (e) => {
      if (!isSnapped && currentHoverPoint !== null) {
        isSnapped = true;
        currentSnappedSec = currentHoverPoint;
        const info = getPointInfo(currentSnappedSec, activeJobsForRender, activeOverlaps);
        let html = `<div style="font-weight:bold; border-bottom:1px solid #f97316; padding-bottom:4px; margin-bottom:6px;">📍 ${info.time}</div>`;
        if (info.starting.length) html += `<div>🎬 شروع: ${info.starting.join(', ')}</div>`;
        if (info.ending.length) html += `<div>🏁 پایان: ${info.ending.join(', ')}</div>`;
        if (info.inOverlap.length) {
          html += `<div>🔁 همپوشانی‌ها:</div>`;
          info.inOverlap.forEach(o => html += `<div style="margin-left:8px;">⏱ ${o.start} → ${o.end}<br> <span style="font-size:9px;">${o.jobs.join(' , ')}</span></div>`);
        }
        if(info.starting.length===0 && info.ending.length===0 && info.inOverlap.length===0) html+=`<div>⏺ بدون رویداد خاص</div>`;
        html += `<div style="margin-top:8px; font-size:9px; color:#aaa;">🔁 کلیک دوباره برای خروج</div>`;
        infoBoxDiv.innerHTML = html;
        
        // موقعیت باکس با fixed و رعایت حاشیه
        infoBoxDiv.style.display = 'block';
        const boxX = e.clientX + 20;
        const boxY = e.clientY - 80;
        infoBoxDiv.style.left = (boxX + 240 > window.innerWidth ? boxX - 280 : boxX) + 'px';
        infoBoxDiv.style.top = Math.max(10, boxY) + 'px';
        
        tooltipDiv.style.display = 'none';
        verticalLine.style.width = '3px';
        verticalLine.style.backgroundColor = '#f97316';
        updateVerticalLinePosition(currentSnappedSec);
      } 
      else if (isSnapped) {
        isSnapped = false;
        currentSnappedSec = null;
        infoBoxDiv.style.display = 'none';
        verticalLine.style.width = '2px';
        verticalLine.style.backgroundColor = '#f97316';
        verticalLine.style.display = 'none';
        tooltipDiv.style.display = 'none';
      }
    });
    
    container.addEventListener('mouseleave', () => {
      if (!isSnapped) {
        verticalLine.style.display = 'none';
        tooltipDiv.style.display = 'none';
      }
    });
    
    // برای بروز رسانی موقعیت خط در هنگام اسکرول در حالت snapped
    container.addEventListener('scroll', () => {
      if (isSnapped && currentSnappedSec !== null) {
        updateVerticalLinePosition(currentSnappedSec);
      }
    });
    
    window.addEventListener('resize', () => {
      if (isSnapped && currentSnappedSec !== null) {
        setTimeout(() => updateVerticalLinePosition(currentSnappedSec), 30);
      }
    });
  }
  
  // بارگذاری XML
  async function loadData() {
    try {
      const response = await fetch('jobs.xml');
      const xmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'text/xml');
      const nodes = xml.getElementsByTagName('Job');
      allJobs = Array.from(nodes).map(node => ({
        name: node.getAttribute('name'),
        start: node.getAttribute('start'),
        end: node.getAttribute('end')
      }));
      const overlaps = findAllOverlaps(allJobs);
      const overlapNames = new Set();
      overlaps.forEach(o => o.jobs.forEach(j => overlapNames.add(j)));
      document.getElementById('info').innerHTML = overlapNames.size > 0 ? `🔴 ${overlapNames.size} جاب همپوشان` : '✅ بدون همپوشانی';
      render(allJobs);
      initMouseTracking();
      
      document.getElementById('btnAll').onclick = () => {
        if (currentFilter === 'all') return;
        currentFilter = 'all';
        isSnapped = false; currentSnappedSec = null;
        if(infoBoxDiv) infoBoxDiv.style.display = 'none';
        document.getElementById('btnAll').classList.add('active');
        document.getElementById('btnOverlap').classList.remove('active');
        render(allJobs);
        document.getElementById('info').innerHTML = overlapNames.size > 0 ? `🔴 ${overlapNames.size} جاب همپوشان` : '✅ بدون همپوشانی';
      };
      
      document.getElementById('btnOverlap').onclick = () => {
        if (currentFilter === 'overlap') return;
        currentFilter = 'overlap';
        isSnapped = false; currentSnappedSec = null;
        if(infoBoxDiv) infoBoxDiv.style.display = 'none';
        document.getElementById('btnAll').classList.remove('active');
        document.getElementById('btnOverlap').classList.add('active');
        const ov = findAllOverlaps(allJobs);
        const nameSet = new Set();
        ov.forEach(o => o.jobs.forEach(j => nameSet.add(j)));
        const filtered = allJobs.filter(job => nameSet.has(job.name));
        render(filtered);
        document.getElementById('info').innerHTML = `🔴 ${filtered.length} جاب دارای همپوشانی`;
      };
      
    } catch(e) {
      console.warn(e);
      document.getElementById('info').innerHTML = '⚠️ نمونه دیتا (XML缺失)';
      allJobs = [
        { name: "ETL_Orders", start: "02:30:00", end: "05:45:00" },
        { name: "DataSync", start: "04:00:00", end: "06:20:00" },
        { name: "ReportGen", start: "08:15:00", end: "10:00:00" },
        { name: "Backup", start: "09:30:00", end: "12:10:00" },
        { name: "Streaming", start: "13:00:00", end: "15:30:00" },
        { name: "Analytics", start: "14:20:00", end: "17:00:00" }
      ];
      render(allJobs);
      initMouseTracking();
      const ov = findAllOverlaps(allJobs);
      const sz = new Set(); ov.forEach(o=>o.jobs.forEach(j=>sz.add(j)));
      document.getElementById('info').innerHTML = sz.size > 0 ? `🔴 ${sz.size} همپوشان (نمونه)` : '✅ بدونهمپوشانی';
    }
  }
  
  loadData();
</script>
</body>
</html>
